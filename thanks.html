<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank you</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&family=Shippori+Mincho:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#090908;
      color:#f4f1eb;
      font-family:"Noto Sans JP",sans-serif;
    }
    .wrap{
      width:min(calc(100% - 32px),720px);
      text-align:center;
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:48px 28px;
      background:rgba(255,255,255,.03);
    }
    h1{
      margin:0 0 12px;
      font-family:"EB Garamond",serif;
      font-size:clamp(2.2rem,5vw,3.8rem);
      font-weight:500;
    }
    p{
      margin:0 0 24px;
      color:rgba(244,241,235,.75);
      line-height:1.8;
    }
    a{
      display:inline-block;
      color:#f4f1eb;
      text-decoration:none;
      border:1px solid rgba(255,255,255,.18);
      border-radius:999px;
      padding:12px 22px;
      font-family:"EB Garamond",serif;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Thank you</h1>
    <p>Your message has been sent.</p>
    <a href="/">Back to site</a>
  </div>
</body>
</html>
